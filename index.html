<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PowerPlus</title>
    <script>
      // Restore path encoded by public/404.html (GitHub Pages SPA workaround).
      (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          // pathname is e.g. '/Powerplus/' — strip trailing slash before appending
          var base = window.location.pathname.replace(/\/$/, '');
          window.history.replaceState(null, null, base + decodeURIComponent(p));
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
