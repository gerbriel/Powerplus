<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PowerPlus</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GH Pages 404s on a deep link (e.g. /Powerplus/org/iron-north),
      // this page encodes the full path as a query param and redirects to the
      // root index.html, which then restores it before React boots.
      var l = window.location;
      // Repo prefix = /Powerplus  (no trailing slash)
      var prefix = l.pathname.split('/').slice(0, 2).join('/');
      // Everything after the prefix → the SPA path (e.g. /org/iron-north)
      var spaPath = l.pathname.slice(prefix.length) || '/';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        prefix + '/?p=' + encodeURIComponent(spaPath + l.search + l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
